<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Management Practices</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary-blue:#007bff;
  --dark-navy:#1a1c23;
  --bg-light:#f4f7f9;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg-light);
}

/* HEADER */
header{
  background:var(--dark-navy);
  color:white;
  padding:1rem 5%;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

nav a{
  color:#00d2ff;
  text-decoration:none;
}

/* HERO */
.hero{
  background:linear-gradient(135deg,#1a1c23,#2c3e50);
  color:white;
  padding:60px 20px;
  text-align:center;
}

.hero h2{
  font-size:2.4rem;
}

.hero p{
  color:#cbd5e1;
  margin-top:10px;
}

/* GRID */
.container{
  max-width:1200px;
  margin:40px auto;
  padding:0 20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:25px;
}

/* CARD */
.card{
  background:white;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 4px 15px rgba(0,0,0,0.05);
  cursor:pointer;
  transition:.3s;
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 12px 30px rgba(0,0,0,0.15);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-content{
  padding:20px;
}

.card h3{
  margin-bottom:10px;
}

.card p{
  color:#555;
  font-size:0.95rem;
}

/* Loading text */
#practiceContainer:empty::after{
  content:"Connecting to API...";
  grid-column:1/-1;
  text-align:center;
  padding:40px;
  color:#888;
}
</style>
</head>

<body>

<header>
  <h2>SmartWater</h2>
  <nav>
    <a href="home.html">← Back to Home</a>
  </nav>
</header>

<section class="hero">
  <h2>Water Management Practices</h2>
  <p>Discover sustainable techniques and innovative methods to conserve water.</p>
</section>

<div class="container" id="practiceContainer"></div>

<script>
const API = "https://smart-water-monitoring-system-hcgv.onrender.com/api/water";

/* ===============================
   LOAD PRACTICES
================================*/
async function loadPractices() {

  const container = document.getElementById("practiceContainer");

  try {

    const res = await fetch(`${API}/practice/all`);
    const data = await res.json();

    container.innerHTML = "";

    if(!data.length){
      container.innerHTML =
      "<p style='grid-column:1/-1;text-align:center'>No practices found</p>";
      return;
    }

    data.forEach(p => {

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${p.image || 'https://picsum.photos/400/200'}">
        <div class="card-content">
            <h3>${p.title}</h3>
            <p>${p.description}</p>
        </div>
      `;

      /* ✅ CLICK → OPEN DETAILS PAGE */
      
      container.appendChild(card);

    });

  } catch(err){
    container.innerHTML =
    "<p style='grid-column:1/-1;color:red;text-align:center'>API Connection Failed</p>";
  }
}

loadPractices();
</script>

</body>
</html>
