<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | Smart Water</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

/* ================= VIDEO BACKGROUND ================= */

.video-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* Overlay */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
z-index:-1;
}

/* ================= REGISTER BOX ================= */

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.register-box{
width:380px;
padding:40px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(15px);
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
text-align:center;
}

.register-box h2{
margin-bottom:25px;
font-weight:600;
}

/* Inputs */

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
outline:none;
font-size:15px;
}

/* Button */

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#007bff;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#0056b3;
}

a{
color:#00d2ff;
text-decoration:none;
}

#message{
margin-top:10px;
}

</style>
</head>

<body>

<!-- Background Video -->
<video autoplay muted loop class="video-bg">
<source src="assets/Video Project 2.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- Register Card -->
<div class="register-box">

<h2>💧 Create Smart Water Account</h2>

<input type="text" id="name" placeholder="Full Name">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="register()">Register</button>

<p id="message"></p>

<p style="margin-top:15px">
Already have account?
<a href="login.html">Login</a>
</p>

</div>

<script src="js/app.js"></script>

</body>
</html>
